<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPortal - Static Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4fdf7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            padding: 40px;
        }
        .btn-success {
            background-color: #1dbf73;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .btn-success:hover {
            background-color: #17a060;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="mb-4">
            <i class="bi bi-briefcase-fill text-success" style="font-size: 4rem;"></i>
        </div>
        <h1 class="fw-bold mb-3">JobPortal Static Page</h1>
        <p class="text-muted mb-4">
            This is a static HTML file (index.html). The main dynamic application is running safely on the root path.
        </p>
        <div class="d-grid gap-2">
            <a href="/" class="btn btn-success btn-lg">
                Go to Main Website <i class="bi bi-arrow-right ms-2"></i>
            </a>
            <a href="/jobs/search" class="btn btn-outline-secondary">
                Search Jobs
            </a>
        </div>
        <div class="mt-4 small text-muted">
            Safe file creation: This file does not interfere with the main app.
        </div>
    </div>

</body>
</html>
